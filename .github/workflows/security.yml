name: Security

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TRIVY_IMAGE: aquasec/trivy:0.68.2@sha256:05d0126976bdedcd0782a0336f77832dbea1c81b9cc5e4b3a5ea5d2ec863aca7

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "31 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  npm-audit-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit for production dependencies
        run: npm audit --omit=dev --audit-level=high

  trivy-fs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare security artifact directory
        run: mkdir -p .tmp/security

      - name: Run Trivy filesystem scan
        run: docker run --rm -v "${{ github.workspace }}:/work" -w /work "${{ env.TRIVY_IMAGE }}" fs --scanners vuln --skip-version-check --severity HIGH,CRITICAL --ignore-unfixed --format sarif --output .tmp/security/trivy-fs.sarif --exit-code 1 .

      - name: Upload Trivy filesystem SARIF
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        with:
          sarif_file: .tmp/security/trivy-fs.sarif
          category: trivy-fs

      - name: Upload Trivy filesystem artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: trivy-fs-results
          path: .tmp/security/trivy-fs.sarif
          if-no-files-found: error
